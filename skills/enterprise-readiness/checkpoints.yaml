# Example checkpoints.yaml for enterprise-readiness skill
# Copy this to your skill repo root as checkpoints.yaml

version: 1
skill_id: enterprise-readiness

mechanical:
  # === SECURITY WORKFLOW CHECKS ===
  - id: ER-01
    type: file_exists
    target: .github/workflows/security.yml
    severity: error
    desc: "Security workflow must exist"

  - id: ER-02
    type: regex
    target: .github/workflows/security.yml
    pattern: '\bcomposer\b.*audit|\btypo3-ci-workflows\b'
    severity: error
    desc: "Security workflow should run composer audit (or delegate to typo3-ci-workflows)"

  - id: ER-03
    type: regex
    target: .github/workflows/security.yml
    pattern: '\b(sbom|cyclonedx|syft|typo3-ci-workflows)\b'
    severity: warning
    desc: "Security workflow should generate SBOM (or delegate to typo3-ci-workflows)"

  # === BADGE CHECKS ===
  - id: ER-04
    type: regex
    target: README.md
    pattern: 'scorecard\.dev|api\.scorecard\.dev'
    severity: warning
    desc: "README should have OpenSSF Scorecard badge"

  - id: ER-05
    type: contains
    target: README.md
    pattern: "bestpractices.dev"
    severity: warning
    desc: "README should have OpenSSF Best Practices badge"

  - id: ER-06
    type: regex
    target: README.md
    pattern: 'slsa\.dev|slsa-github-generator'
    severity: info
    desc: "README should have SLSA badge (if SLSA provenance enabled)"

  # === DEPENDENCY MANAGEMENT ===
  - id: ER-07
    type: file_exists
    target: .github/dependabot.yml
    severity: warning
    desc: "Dependabot should be configured"

  - id: ER-08
    type: contains
    target: .github/dependabot.yml
    pattern: 'package-ecosystem: "composer"'
    severity: warning
    desc: "Dependabot should monitor composer dependencies"

  - id: ER-09
    type: contains
    target: .github/dependabot.yml
    pattern: 'package-ecosystem: "github-actions"'
    severity: warning
    desc: "Dependabot should monitor GitHub Actions"

  # === ACTION PINNING ===
  - id: ER-10
    type: regex
    target: .github/workflows/*.yml
    pattern: 'uses: [^@]+@[a-f0-9]{40}'
    severity: warning
    desc: "GitHub Actions should be pinned to SHA. Exception: org-internal reusable workflows may use @main or @tag"

  # === WORKFLOW PERMISSIONS ===
  - id: ER-11
    type: contains
    target: .github/workflows/ci.yml
    pattern: "permissions:"
    severity: warning
    desc: "CI workflow should declare explicit permissions"

  - id: ER-12
    type: regex
    target: .github/workflows/ci.yml
    pattern: 'contents:\s*read'
    severity: warning
    desc: "CI workflow should use minimal permissions (contents: read)"

  # === COVERAGE ===
  - id: ER-13
    type: regex
    target: .github/workflows/ci.yml
    pattern: '\b(codecov|upload-coverage)\b'
    severity: warning
    desc: "CI should upload coverage to Codecov (or use upload-coverage input for typo3-ci-workflows)"

  - id: ER-14
    type: file_exists
    target: codecov.yml
    severity: info
    desc: "Codecov config should exist for coverage thresholds"

  # === SLSA PROVENANCE ===
  - id: ER-15
    type: regex
    target: .github/workflows/*.yml
    pattern: 'slsa-github-generator'
    severity: info
    desc: "Should use SLSA GitHub generator for provenance"

  # === REQUIRED WORKFLOWS ===
  - id: ER-18
    type: file_exists
    target: .github/workflows/ci.yml
    severity: error
    desc: "CI workflow (ci.yml) must exist"

  - id: ER-19
    type: file_exists
    target: .github/workflows/codeql.yml
    severity: warning
    desc: "CodeQL workflow must exist for code scanning"

  - id: ER-20
    type: file_exists
    target: .github/workflows/scorecard.yml
    severity: warning
    desc: "OpenSSF Scorecard workflow must exist"

  - id: ER-21
    type: file_exists
    target: .github/workflows/dependency-review.yml
    severity: warning
    desc: "Dependency review workflow must exist"

  # === REQUIRED BADGES ===
  - id: ER-22
    type: regex
    target: README.md
    pattern: "github.com/.*/actions/workflows"
    severity: error
    desc: "README must have CI status badge"

  - id: ER-23
    type: contains
    target: README.md
    pattern: "codecov.io"
    severity: warning
    desc: "README must have Codecov badge"

  - id: ER-24
    type: regex
    target: README.md
    pattern: "baseline\\.opensssf\\.org|opensssf\\.org.*baseline"
    severity: info
    desc: "README should have OpenSSF Baseline badge"

  # === SCRIPT INJECTION PREVENTION ===
  - id: ER-25
    type: regex_not
    target: .github/workflows/*.yml
    pattern: 'run:.*\$\{\{\s*github\.event\.'
    severity: error
    desc: "Workflows must not interpolate github.event.* in run: blocks (script injection)"

  # === GITHUB ATTESTATION (alternative to SLSA generator) ===
  - id: ER-26
    type: regex
    target: .github/workflows/*.yml
    pattern: "attest-build-provenance|slsa-github-generator"
    severity: info
    desc: "Release workflow should generate provenance attestation"

  # === SUPPLY CHAIN SECURITY ===
  - id: ER-27
    type: regex
    target: .github/workflows/*.yml
    pattern: 'uses:\s*step-security/harden-runner@[a-f0-9]{40}'
    severity: warning
    desc: "Workflows should include step-security/harden-runner for egress monitoring, pinned to a commit SHA"

  # === SHA-PINNING VIOLATION DETECTION ===
  - id: ER-28
    type: regex_not
    target: .github/workflows/*.yml
    pattern: 'uses:\s+[^#\n]+@v\d+(?!\S*[a-f0-9]{40})\s'
    severity: warning
    desc: "GitHub Actions must not use tag-only references (@v4, @v6); pin to SHA with version comment (uses: owner/action@<sha> # vX.Y.Z) for supply chain security"

llm_reviews:
  # === ACTION PINNING (companion to ER-10) ===
  - id: ER-10b
    domain: security
    prompt: |
      Check GitHub Actions pinning in workflow files:
      1. Third-party actions (e.g., actions/checkout, codecov/codecov-action) MUST be pinned to SHA
      2. Org-internal reusable workflows (uses: org/repo/.github/workflows/*.yml@ref) MAY use @main or @tag
      3. Flag any third-party action using a tag (e.g., @v4) or branch instead of SHA
    severity: warning
    desc: "Verify third-party actions are SHA-pinned. Org-internal reusable workflows (uses: org/repo/.github/workflows/) may reference @main or tags."

  # === SIGNED COMMITS ===
  - id: ER-16
    domain: security
    prompt: |
      Check if the repository requires signed commits:
      1. Look for branch protection settings mentioning signatures
      2. Check if .github/workflows mention commit signing
      3. Check CONTRIBUTING.md for signing requirements
    severity: warning
    desc: "Repository should require signed commits"

  # === HARDEN-RUNNER REVIEW ===
  - id: ER-27b
    domain: security
    prompt: |
      Verify Harden-Runner configuration in workflow files:
      1. Every job should have step-security/harden-runner as its FIRST step
      2. Check egress-policy: prefer 'block' with allowed-endpoints over 'audit'
      3. Verify harden-runner is SHA-pinned (not tag-referenced)
      4. If block mode: verify allowed-endpoints are appropriate for the job type
    severity: warning
    desc: "Verify Harden-Runner is correctly configured in all workflow jobs with appropriate egress policy"

  # === SLSA PROVENANCE REVIEW ===
  - id: ER-17
    domain: security
    prompt: |
      Verify SLSA provenance setup if present:
      1. Check for slsa-github-generator workflow
      2. Verify base64-subjects format is correct (sha256sum output, not JSON)
      3. Check for compile-generator: true if needed
    severity: info
    desc: "SLSA provenance should be correctly configured"
